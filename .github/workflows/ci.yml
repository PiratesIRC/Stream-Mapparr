name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default token: this workflow only reads the checkout.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # Compilation does not execute imports, so this passes without Django/the
      # Dispatcharr ORM installed — it catches syntax errors before deploy.
      - name: Byte-compile plugin sources
        run: |
          python -m py_compile Stream-Mapparr/plugin.py
          python -m py_compile Stream-Mapparr/fuzzy_matcher.py
          python -m py_compile Stream-Mapparr/matching_core.py
          python -m py_compile Stream-Mapparr/__init__.py

      - name: Version sync (plugin.json == plugin.py)
        run: python scripts/check_version_sync.py

      - name: Validate channel databases
        run: python scripts/validate_databases.py

      # Guards against the bug-087 packaging failure (backslash path separators
      # from Compress-Archive break the Linux-side install). Validates every
      # committed Stream-Mapparr.zip; no-op when none is checked in.
      - name: Validate committed release zip(s)
        run: |
          shopt -s globstar nullglob
          zips=(**/Stream-Mapparr.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "No committed Stream-Mapparr.zip — skipping."
            exit 0
          fi
          rc=0
          for z in "${zips[@]}"; do
            echo "::group::$z"
            python scripts/validate_zip.py "$z" || rc=1
            echo "::endgroup::"
          done
          exit $rc

      # Explicit, named drift gate: freezes the pure matcher primitives against
      # tests/matcher_golden_baseline.json (Stage 0 of the matcher standardization
      # plan). -o addopts="" neutralizes any inherited ini options for a clean run.
      - name: Matcher golden drift gate
        run: python -m pytest tests/test_matcher_golden.py -q -o addopts=""

      - name: Run test suite
        run: python -m pytest -q
